<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Citation Cleaner</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="bar">
      <span class="wordmark">CC</span>
      <strong>Citation Cleaner</strong>
      <span class="local">Local only</span>
    </header>

    <div class="controls">
      <label class="field">
        <span>Source</span>
        <select id="provider"></select>
      </label>
      <label class="field">
        <span>Intensity</span>
        <select id="intensity"></select>
      </label>
    </div>

    <textarea
      id="input"
      placeholder="Paste AI-copied text here…"
      spellcheck="false"
    ></textarea>

    <div class="actions">
      <button id="clean" class="primary" type="button">Clean</button>
      <button id="copy" type="button" disabled>Copy</button>
    </div>

    <p id="status" class="status" aria-live="polite">
      Paste text, clean locally, copy the result.
    </p>

    <textarea id="output" readonly placeholder="Cleaned text appears here…"></textarea>

    <a class="link" id="open-web" href="https://cleaner.tenten.dev" target="_blank" rel="noopener"
      >Open the full web app ↗</a
    >

    <script type="module" src="dist/popup.js"></script>
  </body>
</html>
